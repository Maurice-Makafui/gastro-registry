services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: gastro-referral-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # ── Set these in the Render dashboard (never commit real values) ──────
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false          # e.g. https://gastro-referral-frontend.onrender.com,http://localhost:3000
      - key: FRONTEND_URL
        sync: false          # e.g. https://gastro-referral-frontend.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_DOCTOR_PASSWORD
        sync: false
      - key: SEED_NURSE_PASSWORD
        sync: false
      - key: SEED_HEPATO_PASSWORD
        sync: false
      - key: SEED_REFERRER_PASSWORD
        sync: false
      # ── Optional — only set if you use Redis/Celery on Render ────────────
      # - key: REDIS_URL
      #   sync: false
      # ── Optional — only set if email is active ───────────────────────────
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: gastro-referral-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      # ── Set these in the Render dashboard ────────────────────────────────
      - key: NEXT_PUBLIC_API_URL
        sync: false          # e.g. https://gastro-referral-api.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      # Optional cosmetic vars (safe to hard-code)
      - key: NEXT_PUBLIC_APP_NAME
        value: "Gastro Referral System"
      - key: NEXT_PUBLIC_APP_VERSION
        value: "2.1.0"
