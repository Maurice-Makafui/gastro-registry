services:
  # ── Backend (Render Web Service) ───────────────────────────────────────────
  # Frontend is deployed to Vercel — NOT listed here.
  - type: web
    name: gastro-referral-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      # ── Set these in the Render dashboard — never commit real values ───────
      - key: DATABASE_URL
        sync: false   # postgresql+psycopg://USER:PASSWORD@HOST:6543/postgres?sslmode=require
      - key: SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false   # https://your-app.vercel.app,http://localhost:3000
      - key: FRONTEND_URL
        sync: false   # https://your-app.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_DOCTOR_PASSWORD
        sync: false
      - key: SEED_NURSE_PASSWORD
        sync: false
      - key: SEED_HEPATO_PASSWORD
        sync: false
      - key: SEED_REFERRER_PASSWORD
        sync: false
      # ── Uncomment if Redis/Celery is active on Render ─────────────────────
      # - key: REDIS_URL
      #   sync: false
      # ── Uncomment if SMTP email is active ────────────────────────────────
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   sync: false
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASSWORD
      #   sync: false
      # - key: SMTP_FROM
      #   sync: false
